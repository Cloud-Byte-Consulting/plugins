name: Validate cross-tool plugins

on:
  pull_request:
    paths:
      - ".claude-plugin/marketplace.json"
      - "README.md"
      - "docs/**"
      - "platform-assessment/**"
      - "prompt-workflows/**"
      - "gpu-research-platform/**"
      - "model-training-ops/**"
      - "inference-testing/**"
      - "research-data-platform/**"
      - "adp-enablement/**"
      - "authoring/**"
      - "ai-operations/**"
      - "engineering-career/**"
      - "ai-engineering/**"
      - "scripts/generate_plugin_docs.py"
      - "scripts/validate_repository.py"
      - "scripts/package_research_perplexity.py"
      - ".github/workflows/validate-prompt-workflows.yml"
  push:
    branches:
      - main
    paths:
      - ".claude-plugin/marketplace.json"
      - "README.md"
      - "docs/**"
      - "platform-assessment/**"
      - "prompt-workflows/**"
      - "gpu-research-platform/**"
      - "model-training-ops/**"
      - "inference-testing/**"
      - "research-data-platform/**"
      - "adp-enablement/**"
      - "authoring/**"
      - "ai-operations/**"
      - "engineering-career/**"
      - "ai-engineering/**"
      - "scripts/generate_plugin_docs.py"
      - "scripts/validate_repository.py"
      - "scripts/package_research_perplexity.py"
      - ".github/workflows/validate-prompt-workflows.yml"

permissions:
  contents: read

jobs:
  validate:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate marketplace and plugins
        run: python scripts/validate_repository.py
      - name: Test cross-platform packaging
        run: python -m unittest prompt-workflows/scripts/test_package_perplexity.py
      - name: Verify Perplexity packages
        run: python prompt-workflows/scripts/package_perplexity.py --check
      - name: Verify research-division Perplexity packages
        run: python scripts/package_research_perplexity.py --check

  installer-discovery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Discover nested skills with the pinned installer
        run: npx --yes skills@1.5.19 add . --list --full-depth > available-skills.txt
      - name: Require every documented skill
        run: |
          for plugin_dir in platform-assessment adp-enablement gpu-research-platform model-training-ops inference-testing research-data-platform authoring ai-operations engineering-career ai-engineering prompt-workflows; do
            for skill_dir in "$plugin_dir"/skills/*; do
              skill_name="$(basename "$skill_dir")"
              grep -Fq "$skill_name" available-skills.txt
            done
          done
